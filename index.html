<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instant Arena — 3D Shooter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="ui">
      <div id="hud">
        <div class="hud-panel">
          <span class="label">YOU</span>
          <div class="bar-track"><div id="player-health" class="bar-fill player"></div></div>
        </div>
        <div class="hud-center">
          <span id="difficulty" class="hud-stat">Funk (1/5)</span>
          <span id="kills" class="hud-stat">Kills: 0</span>
          <span id="enemy-count" class="hud-stat">Enemies: 0/0</span>
          <span id="tier-progress" class="hud-stat"></span>
        </div>
        <div class="hud-panel">
          <span class="label">ENEMY</span>
          <div class="bar-track"><div id="enemy-health" class="bar-fill enemy"></div></div>
        </div>
      </div>
      <div id="crosshair">+</div>
      <div id="overlay" class="visible">
        <h1>Instant Arena</h1>
        <p class="tagline">3D first-person shooter — conquer 5 difficulty tiers</p>
        <div class="controls">
          <p><kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> Move</p>
          <p><kbd>Mouse</kbd> Look around</p>
          <p><kbd>Click</kbd> / <kbd>Space</kbd> Shoot</p>
        </div>
        <div class="tier-info">
          <div class="tier-badge tier-1">1 - Funk</div>
          <div class="tier-badge tier-2">2 - Groove</div>
          <div class="tier-badge tier-3">3 - Neon</div>
          <div class="tier-badge tier-4">4 - Fever</div>
          <div class="tier-badge tier-5">5 - Megamix</div>
        </div>
        <button id="start-btn">Enter Arena</button>
      </div>
      <div id="message" class="hidden"></div>
    </div>
    <canvas id="game"></canvas>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
